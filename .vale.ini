StylesPath = styles
MinAlertLevel = warning
Vocab = Brand
Packages = https://github.com/vale-cli/write-good/releases/download/v0.4.1/write-good.zip, https://github.com/vale-cli/proselint/releases/download/v0.3.4/proselint.zip

[*.md]
BasedOnStyles = Vale, brand, spec, write-good, proselint
Vale.Terms = NO
brand.MarketingRegister = error
brand.HedgeWords = error
brand.FillerAdjectives = error
spec.RFCKeywords = error
spec.FirstPersonPlural = error
spec.SecondPersonImperative = error
write-good.E-Prime = NO
write-good.Passive = warning
write-good.TooWordy = warning
write-good.ThereIs = warning
proselint.But = NO
proselint.Annotations = NO
proselint.Typography = warning

[{docs/brainstorms,docs/plans,docs/research}/**]
BasedOnStyles =

[AGENTS.md]
BasedOnStyles =

[CHANGELOG.md]
BasedOnStyles =

# Vale's markdown parser tokenizes hyphenated frontmatter values
# (e.g. id: p1-behavioral-must) and flags the "must" suffix as a
# lowercase RFC keyword. Stable identifier — disable spec.RFCKeywords
# for this file rather than rename the id.
[docs/decisions/p1-behavioral-must.md]
spec.RFCKeywords = NO
