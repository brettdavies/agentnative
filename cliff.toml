# git-cliff configuration for agentnative-spec.
#
# Two-stage pipeline driven by `scripts/generate-changelog.sh`:
#   1. `git-cliff` renders a skeleton entry from each commit's subject line,
#      linking `(#N)` squash-merge references to the PR via `[remote.github]`.
#   2. The script's Python post-processor fetches each PR body from the
#      GitHub API, extracts its `## Changelog` → `### Added / Changed /
#      Fixed / Removed / Security` subsections, and rewrites the skeleton
#      bullets with the richer PR-body content. Authors + PR links remain.
#
# The PR body is the source of truth. If a bullet is wrong, edit the PR
# body on GitHub (even after merge — PR bodies stay editable) and re-run
# `scripts/generate-changelog.sh` on the release branch; it re-fetches.
# Never hand-write `CHANGELOG.md`.
#
# No commit-body parsing, no preprocessors — cherry-picks and squash-merges
# can't mangle what we never read.

[changelog]
header = """
# Changelog

All notable changes to the agent-native CLI standard are documented here.

"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}

### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
    {% if commit.remote.username %} by @{{ commit.remote.username }}{%- endif %}\
    {% if commit.remote.pr_number %} in \
      [#{{ commit.remote.pr_number }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/pull/{{ commit.remote.pr_number }}){%- endif %}
{%- endfor %}
{% endfor %}

"""

trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
tag_pattern = "v[0-9]+.[0-9]+.[0-9]+"

commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^docs", group = "Changed" },
  { message = "^perf", group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^chore", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
  { message = "^release", skip = true },
]

[remote.github]
owner = "brettdavies"
repo = "agentnative"
