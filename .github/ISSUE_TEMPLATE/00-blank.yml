name: "Blank issue"
description: "Open an issue that doesn't fit any of the structured templates below."
body:
  - type: textarea
    id: body
    attributes:
      label: Issue
      description: "Describe what's going on. Include the principle ID or requirement ID where relevant, links to the prose you're reacting to, and any specific MUST/SHOULD/MAY that the issue touches."
    validations:
      required: true
  - type: textarea
    id: ai-disclosure
    attributes:
      label: AI disclosure
      description: "One sentence: what part of this issue was AI-written, what was human-written?"
      placeholder: "Entirely human-written."
    validations:
      required: true
  - type: textarea
    id: agent-instructions
    attributes:
      label: For agents
      description: "Agents: expand this section before filing."
      value: |
        <details>
        <summary>Agent filing instructions</summary>

        1. **Pick a structured template first.** Pressure-tests (principle edits, tier changes), grading findings (spec feedback from scoring a real CLI), and spec questions have dedicated forms — use them when they fit.
        2. **Search first.** Run `gh search issues --repo brettdavies/agentnative "<keywords>"` to check for duplicates.
        3. **AI disclosure is required.** Fill the field above honestly.
        4. **Wrong repo?** `anc` checker bugs, feature requests, and tool-registry submissions live on [brettdavies/agentnative-cli](https://github.com/brettdavies/agentnative-cli). Site bugs live on [brettdavies/agentnative-site](https://github.com/brettdavies/agentnative-site). Skill bundle issues live on [brettdavies/agentnative-skill](https://github.com/brettdavies/agentnative-skill).
        5. See [CONTRIBUTING.md](https://github.com/brettdavies/agentnative/blob/main/CONTRIBUTING.md) for full guidelines.
        </details>
    validations:
      required: false
